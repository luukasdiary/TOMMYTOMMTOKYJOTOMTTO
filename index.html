<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Notion Widget</title>

<!-- FontAwesome -->
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">

<!-- Your CSS -->
<link rel="stylesheet" href="style.css">

<!-- 🤍 FORCED WHITE BACKGROUND -->
<style>
  html, body {
    background: #ffffff !important;
    background-color: #ffffff !important;
  }

  /* Remove blur layers completely */
  #player-bg-artwork,
  #player-bg-layer {
    display: none !important;
  }

  /* Make all containers white */
  #player-container,
  #player,
  #player-track,
  #player-content {
    background: #ffffff !important;
    background-color: #ffffff !important;
    box-shadow: none !important;
  }
</style>

</head>

<body>

<div id="player-bg-artwork"></div>
<div id="player-bg-layer"></div>

<div id="player-container">
  <div id="player">
    <div id="player-track">
      <div id="album-name"></div>
      <div id="track-name"></div>

      <div id="track-time">
        <div id="current-time"></div>
        <div id="track-length"></div>
      </div>

      <div id="seek-bar-container">
        <div id="seek-time"></div>
        <div id="s-hover"></div>
        <div id="seek-bar"></div>
      </div>
    </div>

    <div id="player-content">
      <div id="album-art">
        <img src="https://files.catbox.moe/hemcfi.jpg" class="active" id="_1">
        <img src="https://files.catbox.moe/si5stu.jpg" id="_2">
        <img src="https://files.catbox.moe/nslqlc.jpg" id="_3">
        <img src="https://files.catbox.moe/fdk568.jpg" id="_4">
        <img src="https://files.catbox.moe/i2vzot.jpg" id="_5">
        <div id="buffer-box">Buffering ...</div>
      </div>

      <div id="player-controls">
        <div class="control">
          <div class="button" id="play-previous">
            <i class="fas fa-backward"></i>
          </div>
        </div>

        <div class="control">
          <div class="button" id="play-pause-button">
            <i class="fas fa-play"></i>
          </div>
        </div>

        <div class="control">
          <div class="button" id="play-next">
            <i class="fas fa-forward"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script src="script.js"></script>

</body>
</html>
